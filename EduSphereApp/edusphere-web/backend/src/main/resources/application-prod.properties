# Production profile - used when deployed to Railway
# Database - Railway MySQL (injected via environment variables)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/edusphere_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port (Railway injects PORT env variable)
server.port=${PORT:8080}

# Custom configurations (injected via Railway env vars)
edusphere.jwt.secret=${JWT_SECRET:edusphere_jwt_secret_token_key_2026_db_very_long_string_for_security_key_32_bytes_or_more}
edusphere.jwt.expiration=86400000
edusphere.groq.apikey=${GROQ_API_KEY:}
