server.port=8080

# Use in-memory H2 database for development
spring.datasource.url=jdbc:h2:mem:edusphere;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# Use H2 dialect to avoid emitting MySQL-specific DDL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Enable debug logging for security to diagnose 403s during development
logging.level.org.springframework.security=DEBUG

# H2 console (use http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Keep production JWT and other settings in default properties