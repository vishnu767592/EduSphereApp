name: Selenium Tests (300 cases)

on:
  push:
    branches: [ main, develop, 'fix/*', 'add-testing-workflows' ]

jobs:
  selenium-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Install backend dependencies
        run: |
          cd edusphere-web/backend
          mvn -B clean install -DskipTests
      - name: Run Selenium tests
        run: |
          cd edusphere-web/backend
          mvn -B test -Dtest=selenium.*
      - name: Generate Excel report
        run: |
          cd edusphere-web/backend
          mvn exec:java -Dexec.mainClass="com.edusphere.reporting.GenerateReport" -Dexec.classpathScope=test -Dexec.args="--selenium-reports target/surefire-reports --output ../../selenium-report-${{ github.run_id }}.xlsx --min-passed 300"
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: selenium-report-${{ github.run_id }}.xlsx
