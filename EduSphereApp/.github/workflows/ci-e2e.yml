name: E2E Tests (300 cases)

on:
  push:
    branches: [ main, develop, 'fix/*' ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Install backend dependencies
        run: mvn -B clean install -DskipTests
      - name: Compile reporting utility
        run: |
          javac -cp "$(mvn -q -Dexec.executable=echo -Dexec.args='%classpath' --non-recursive exec:classpath)" reporting/GenerateReport.java -d reporting/classes
          jar cf reporting/GenerateReport.jar -C reporting/classes .
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './edusphere-web/frontend/package-lock.json'
      - name: Run E2E Tests (Cypress)
        working-directory: ./edusphere-web/frontend
        run: |
          npm ci
          npm install cypress cypress-multi-reporters mocha-junit-reporter --no-save
          npx cypress run --reporter junit --reporter-options "mochaFile=cypress-results/results-[hash].xml" || true
      - name: Generate Excel report
        run: |
          java -cp reporting/GenerateReport.jar com.edusphere.reporting.GenerateReport \
            --e2e-reports edusphere-web/frontend/cypress-results \
            --output e2e-report-${{ github.run_id }}.xlsx \
            --min-passed 300
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: e2e-report-${{ github.run_id }}.xlsx
