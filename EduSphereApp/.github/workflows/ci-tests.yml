name: CI Tests

on:
  push:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: mvn -B clean install -DskipTests

      - name: Compile reporting utility
        run: |
          javac -cp "$(mvn -q -Dexec.executable=echo -Dexec.args='%classpath' --non-recursive exec:classpath)" reporting/GenerateReport.java -d reporting/classes
          jar cf reporting/GenerateReport.jar -C reporting/classes .

      - name: Run backend unit / validation tests
        run: mvn -B test

      - name: Install frontend dependencies
        working-directory: ./edusphere-web/frontend
        run: npm ci

      - name: Run E2E Tests (Cypress)
        working-directory: ./edusphere-web/frontend
        run: |
          # Install cypress and reporter plugins temporarily if not in package.json
          npm install cypress cypress-multi-reporters mocha-junit-reporter --no-save
          # Run Cypress E2E tests, outputting JUnit XML so the reporter can parse it
          npx cypress run --reporter junit --reporter-options "mochaFile=cypress-results/results-[hash].xml" || true

      - name: Run Selenium UI tests (Java)
        run: mvn -B test -Dtest=selenium.*

      - name: Run Appium Android tests (Java)
        # Assuming Android SDK & emulator are set up in the runner image or via Docker
        run: |
          echo "Starting Android emulator..."
          # Example (requires pre‑installed image). Remove if not needed.
          # emulator -avd testAVD -no-window -no-audio &
          # sleep 30
          mvn -B test -Dtest=appium.*

      - name: Run OWASP ZAP scan (non‑interactive)
        run: |
          docker run --rm owasp/zap2docker-stable zap-baseline.py -t https://your-app-url.com -r zap_report.html || true

      - name: Run JMeter load test (non‑interactive)
        run: |
          docker run --rm -v ${{ "${{" }}github.workspace${" }}" }}/load:/tests -v ${{ "${{" }}github.workspace${" }}" }}/load/results:/results jmeter -n -t /tests/load_test.jmx -l /results/jmeter_results.jtl || true

      - name: Generate Excel report & Check 300 tests passed condition
        run: |
          # If < 300 tests passed across all suites, this will fail and exit with 1
          # The failure prevents the upload step from running, fulfilling the download condition.
          java -cp reporting/GenerateReport.jar com.edusphere.reporting.GenerateReport \
            --unit-tests target/surefire-reports \
            --selenium-reports target/selenium-reports \
            --appium-reports target/appium-reports \
            --e2e-reports edusphere-web/frontend/cypress-results \
            --zap-report zap_report.html \
            --jmeter-results load/results/jmeter_results.jtl \
            --output test-report-${{ github.run_id }}.xlsx \
            --min-passed 300

      - name: Upload test report
        # This will ONLY run if the Generate Excel step was successful (i.e. >= 300 tests passed).
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report-${{ github.run_id }}.xlsx
