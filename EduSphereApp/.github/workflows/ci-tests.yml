name: CI Tests

on:
  push:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: mvn -B clean install -DskipTests

      - name: Run backend unit / validation tests
        run: mvn -B test

      - name: Install frontend dependencies
        working-directory: ./edusphere-web/frontend
        run: npm ci

      - name: Run Selenium UI tests (Java)
        run: mvn -B test -Dtest=selenium.*

      - name: Run Appium Android tests (Java)
        # Assuming Android SDK & emulator are set up in the runner image or via Docker
        run: |
          echo "Starting Android emulator..."
          # Example using avdmanager and emulator commands (requires appropriate image pre‑installed)
          # emulator -avd testAVD -no-window -no-audio &
          # sleep 30
          mvn -B test -Dtest=appium.*

      - name: Run OWASP ZAP scan
        run: |
          docker run -t owasp/zap2docker-stable zap-baseline.py -t https://your-app-url.com -r zap_report.html

      - name: Run JMeter load test
        run: |
          docker run --rm -v ${{"${{"}}github.workspace${"}}"}}/load:/tests -v ${{"${{"}}github.workspace${"}}"}}/load/results:/results jmeter -n -t /tests/load_test.jmx -l /results/jmeter_results.jtl

      - name: Generate Excel report
        run: |
          java -cp reporting/GenerateReport.jar com.edusphere.reporting.GenerateReport \
            --unit-tests target/surefire-reports \
            --selenium-reports target/selenium-reports \
            --appium-reports target/appium-reports \
            --zap-report zap_report.html \
            --jmeter-results load/results/jmeter_results.jtl \
            --output test-report-${"${{"}} github.run_id ${"}}"}.xlsx

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report-${"${{"}} github.run_id ${"}}"}.xlsx
