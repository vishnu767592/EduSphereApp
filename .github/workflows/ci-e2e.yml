name: E2E Tests (300 cases)

on:
  push:
    branches: [ main, develop, 'fix/*', 'add-testing-workflows' ]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Install backend dependencies
        run: |
          cd EduSphereApp/edusphere-web/backend
          mvn -B clean install -DskipTests
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './EduSphereApp/edusphere-web/frontend/package-lock.json'
      - name: Run E2E Tests (Cypress)
        working-directory: ./EduSphereApp/edusphere-web/frontend
        run: |
          npm ci
          npm install cypress cypress-multi-reporters mocha-junit-reporter --no-save
          npx cypress run --reporter junit --reporter-options "mochaFile=cypress-results/results-[hash].xml" || true
      - name: Generate Excel report
        run: |
          cd EduSphereApp/edusphere-web/backend
          mvn exec:java -Dexec.mainClass="com.edusphere.reporting.GenerateReport" -Dexec.classpathScope=test -Dexec.args="--e2e-reports ../frontend/cypress-results --output ../../../e2e-report-${{ github.run_id }}.xlsx --min-passed 300"
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: e2e-report-${{ github.run_id }}.xlsx
