name: Appium Tests (300 cases)

on:
  push:
    branches: [ main, develop, 'fix/*', 'add-testing-workflows' ]
  workflow_dispatch:

jobs:
  appium-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Install backend dependencies
        run: |
          cd EduSphereApp/edusphere-web/backend
          mvn -B clean install -DskipTests
      - name: Run Appium Android tests
        run: |
          cd EduSphereApp/edusphere-web/backend
          mvn -B test -Dtest=appium.*
      - name: Generate Excel report
        run: |
          cd EduSphereApp/edusphere-web/backend
          mvn exec:java -Dexec.mainClass="com.edusphere.reporting.GenerateReport" -Dexec.classpathScope=test -Dexec.args="--appium-reports target/surefire-reports --output ../../../appium-report-${{ github.run_id }}.xlsx --min-passed 300"
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-report
          path: appium-report-${{ github.run_id }}.xlsx
